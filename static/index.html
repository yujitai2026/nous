<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>神智 Nous</title>
<style>
/* ═══════════════════════════════════════════
   CSS Variables & Reset
   ═══════════════════════════════════════════ */
:root {
  --bg: #0f0f1a;
  --bg2: #1a1a2e;
  --bg3: #16213e;
  --surface: #1e1e32;
  --surface2: #252540;
  --border: #2a2a4a;
  --text: #e8e8f0;
  --text2: #a0a0c0;
  --text3: #6a6a8a;
  --accent: #7c5bf5;
  --accent2: #a78bfa;
  --accent-glow: rgba(124, 91, 245, 0.3);
  --success: #34d399;
  --danger: #f87171;
  --warning: #fbbf24;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ═══════════════════════════════════════════
   Utilities
   ═══════════════════════════════════════════ */
.hidden { display: none !important; }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #9333ea);
  color: white;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-danger { background: var(--danger); color: white; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

input[type="text"], input[type="password"], input[type="number"], textarea, select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: var(--transition);
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* ═══════════════════════════════════════════
   Page: Auth (Login / Register)
   ═══════════════════════════════════════════ */
#page-auth {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at top, var(--bg3) 0%, var(--bg) 70%);
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 380px;
  max-width: 90vw;
  box-shadow: var(--shadow);
}
.auth-logo {
  text-align: center;
  margin-bottom: 28px;
}
.auth-logo h1 {
  font-size: 32px;
  background: linear-gradient(135deg, var(--accent2), #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.auth-logo p { color: var(--text3); font-size: 14px; }
.auth-form { display: flex; flex-direction: column; gap: 14px; }
.auth-form input { padding: 12px 16px; }
.auth-toggle {
  text-align: center;
  margin-top: 16px;
  color: var(--text3);
  font-size: 13px;
}
.auth-toggle a {
  color: var(--accent2);
  cursor: pointer;
  text-decoration: none;
}
.auth-toggle a:hover { text-decoration: underline; }
.auth-error {
  color: var(--danger);
  font-size: 13px;
  text-align: center;
  min-height: 20px;
}

/* ═══════════════════════════════════════════
   Page: Main App Layout
   ═══════════════════════════════════════════ */
#page-app {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Top Bar */
.top-bar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 100;
}
.top-bar .logo {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent2), #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.top-bar .spacer { flex: 1; }
.top-bar .nav-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  transition: var(--transition);
}
.top-bar .nav-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
.top-bar .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.top-bar .user-badge {
  font-size: 13px;
  color: var(--text2);
  padding: 4px 10px;
  background: var(--surface2);
  border-radius: 20px;
}

/* Main Content */
.main-content {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   Persona Sidebar
   ═══════════════════════════════════════════ */
.persona-sidebar {
  width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.persona-sidebar h3 {
  padding: 16px 20px 12px;
  font-size: 13px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.persona-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
}
.persona-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 4px;
}
.persona-card:hover { background: var(--surface); }
.persona-card.active {
  background: linear-gradient(135deg, rgba(124,91,245,0.15), rgba(147,51,234,0.1));
  border: 1px solid rgba(124,91,245,0.3);
}
.persona-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.persona-info { flex: 1; min-width: 0; }
.persona-info .name { font-size: 15px; font-weight: 600; }
.persona-info .desc {
  font-size: 12px;
  color: var(--text3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════
   Chat Area
   ═══════════════════════════════════════════ */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.chat-header {
  height: 52px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 10px;
  background: var(--surface);
}
.chat-header .persona-name { font-weight: 600; font-size: 16px; }
.chat-header .persona-desc { font-size: 13px; color: var(--text3); }
.chat-header .spacer { flex: 1; }
.chat-header .header-btn {
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
}
.chat-header .header-btn:hover { background: var(--surface2); }

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg { display: flex; gap: 10px; max-width: 80%; animation: slideUp 0.3s ease; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg.user .msg-avatar { background: var(--accent); font-size: 14px; }

.msg-bubble {
  padding: 10px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.7;
  word-break: break-word;
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--accent), #9333ea);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.assistant .msg-bubble {
  background: var(--surface2);
  color: var(--text);
  border-bottom-left-radius: 4px;
}

/* Welcome Screen */
.chat-welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}
.chat-welcome .welcome-avatar { font-size: 64px; margin-bottom: 16px; }
.chat-welcome h2 { font-size: 22px; margin-bottom: 8px; }
.chat-welcome p { color: var(--text3); font-size: 14px; max-width: 400px; }

/* Typing Indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  align-items: center;
}
.typing-indicator span {
  width: 6px; height: 6px;
  background: var(--text3);
  border-radius: 50%;
  animation: pulse 1.4s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

/* Input Bar */
.chat-input-bar {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.chat-input-bar textarea {
  flex: 1;
  resize: none;
  max-height: 120px;
  min-height: 42px;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
  border-radius: 20px;
}
.send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--accent), #9333ea);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ═══════════════════════════════════════════
   Conversation History Dropdown
   ═══════════════════════════════════════════ */
.conv-dropdown {
  position: absolute;
  top: 52px;
  left: 0;
  right: 0;
  max-height: 400px;
  overflow-y: auto;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 120;
  display: none;
}
.conv-dropdown.open { display: block; }
.conv-dropdown-header {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
}
.conv-dropdown-header h4 {
  flex: 1;
  font-size: 13px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.conv-item {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  cursor: pointer;
  transition: var(--transition);
  border-bottom: 1px solid rgba(42,42,74,0.3);
}
.conv-item:hover { background: var(--surface); }
.conv-item.active { background: rgba(124,91,245,0.12); border-left: 3px solid var(--accent); }
.conv-item-info { flex: 1; min-width: 0; }
.conv-item-title {
  font-size: 14px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.conv-item-meta {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
.conv-item-delete {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--text3);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}
.conv-item-delete:hover { background: var(--danger); color: white; }
.conv-empty {
  text-align: center;
  padding: 24px;
  color: var(--text3);
  font-size: 13px;
}

/* ═══════════════════════════════════════════
   Panel: Profile & Memory (slide-over)
   ═══════════════════════════════════════════ */
.slide-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 400px;
  max-width: 90vw;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 200;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
  box-shadow: -4px 0 24px rgba(0,0,0,0.5);
}
.slide-panel.open { right: 0; }
.panel-header {
  height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
}
.panel-header h3 { flex: 1; font-size: 16px; }
.panel-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--surface2);
  color: var(--text2);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel-close:hover { background: var(--danger); color: white; }
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Profile Form */
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 500;
}
.form-group .tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.form-group .tag {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.form-group .tag .remove {
  cursor: pointer;
  color: var(--danger);
  font-weight: bold;
}
.tag-input {
  display: flex;
  gap: 6px;
}
.tag-input input { flex: 1; }

/* Memory Cards */
.memory-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  transition: var(--transition);
}
.memory-card:hover { border-color: var(--accent); }
.memory-card .mem-key {
  font-size: 12px;
  color: var(--accent2);
  font-weight: 600;
  margin-bottom: 4px;
}
.memory-card .mem-value {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
}
.memory-card .mem-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  justify-content: flex-end;
}
.memory-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.memory-empty .icon { font-size: 48px; margin-bottom: 12px; }
.memory-persona-select {
  margin-bottom: 16px;
}

/* Overlay */
.overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 199;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.open { opacity: 1; pointer-events: auto; }

/* Onboarding Modal */
.onboarding-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 300;
  display: none; align-items: center; justify-content: center;
  animation: fadeIn 0.3s;
}
.onboarding-overlay.open { display: flex; }
.onboarding-modal {
  background: var(--surface); border-radius: 20px;
  width: min(420px, 90vw); max-height: 85vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  border: 1px solid var(--border);
}
.onboarding-header {
  text-align: center; padding: 28px 24px 12px;
}
.onboarding-emoji { font-size: 48px; display: block; margin-bottom: 8px; }
.onboarding-header h2 { margin: 0 0 6px; font-size: 22px; }
.onboarding-header p { margin: 0; color: var(--muted); font-size: 14px; }
.onboarding-body { padding: 8px 24px 16px; }
.onboarding-footer {
  display: flex; justify-content: space-between; gap: 12px;
  padding: 12px 24px 24px;
}
.onboarding-footer .btn { flex: 1; justify-content: center; }

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  color: var(--text);
  opacity: 0;
  z-index: 300;
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }

/* ═══════════════════════════════════════════
   Mobile Responsive
   ═══════════════════════════════════════════ */
@media (max-width: 768px) {
  .persona-sidebar {
    position: fixed;
    left: -280px;
    top: 56px;
    bottom: 0;
    z-index: 150;
    width: 260px;
    transition: left 0.3s ease;
  }
  .persona-sidebar.open { left: 0; }
  .mobile-menu-btn { display: flex !important; }
  .msg { max-width: 90%; }
}
@media (min-width: 769px) {
  .mobile-menu-btn { display: none !important; }
}
</style>
</head>
<body>

<!-- ═══════ Auth Page ═══════ -->
<div id="page-auth">
  <div class="auth-card fade-in">
    <div class="auth-logo">
      <h1>🧠 神智</h1>
      <p>你的多人格 AI 伙伴</p>
    </div>
    <div class="auth-form" id="auth-form">
      <input type="text" id="auth-username" placeholder="昵称（2-20字符）" maxlength="20" autocomplete="username">
      <input type="password" id="auth-password" placeholder="密码（6位以上）" maxlength="50" autocomplete="current-password">
      <div class="auth-error" id="auth-error"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="doAuth()">
        <span id="auth-btn-text">登 录</span>
      </button>
    </div>
    <div class="auth-toggle">
      <span id="auth-toggle-text">还没有账号？</span>
      <a onclick="toggleAuthMode()" id="auth-toggle-link">立即注册</a>
    </div>
  </div>
</div>

<!-- ═══════ Main App ═══════ -->
<div id="page-app" class="hidden">
  <!-- Top Bar -->
  <div class="top-bar">
    <button class="nav-btn mobile-menu-btn" onclick="toggleSidebar()" title="人设列表">☰</button>
    <span class="logo">🧠 神智</span>
    <div class="spacer"></div>
    <span class="user-badge" id="user-badge"></span>
    <button class="nav-btn" onclick="openPanel('profile')" title="我的档案">👤</button>
    <button class="nav-btn" onclick="openPanel('memory')" title="记忆面板">🧩</button>
    <button class="nav-btn" onclick="logout()" title="退出登录">⏻</button>
  </div>

  <div class="main-content">
    <!-- Persona Sidebar -->
    <div class="persona-sidebar" id="persona-sidebar">
      <h3>选择人设</h3>
      <div class="persona-list" id="persona-list"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" style="position:relative;">
      <!-- Welcome / Chat Header -->
      <div class="chat-header hidden" id="chat-header">
        <span class="persona-name" id="chat-persona-name"></span>
        <span class="persona-desc" id="chat-persona-desc"></span>
        <div class="spacer"></div>
        <button class="header-btn" onclick="toggleConvDropdown()" title="历史对话">📋 对话列表</button>
        <button class="header-btn" onclick="newConversation()" title="新建对话">✨ 新对话</button>
        <button class="header-btn" onclick="clearChat()" title="清空当前">🗑 清空</button>
      </div>

      <!-- Conversation History Dropdown -->
      <div class="conv-dropdown" id="conv-dropdown">
        <div class="conv-dropdown-header">

        <option value="">选择人设查看记忆</option>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   State
   ═══════════════════════════════════════════ */
const API = '';
let token = localStorage.getItem('nous_token') || '';
let username = localStorage.getItem('nous_username') || '';
let personas = [];
let currentPersona = null;
let currentConversationId = null;
let conversations = [];
let isRegistering = false;
let isSending = false;
let interests = [];

/* ═══════════════════════════════════════════
   Init
   ═══════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  if (token && username) {
    enterApp();
  }
});

/* ═══════════════════════════════════════════
   Auth
   ═══════════════════════════════════════════ */
function toggleAuthMode() {
  isRegistering = !isRegistering;
  document.getElementById('auth-btn-text').textContent = isRegistering ? '注 册' : '登 录';
  document.getElementById('auth-toggle-text').textContent = isRegistering ? '已有账号？' : '还没有账号？';
  document.getElementById('auth-toggle-link').textContent = isRegistering ? '立即登录' : '立即注册';
  document.getElementById('auth-error').textContent = '';
}

async function doAuth() {
  const u = document.getElementById('auth-username').value.trim();
  const p = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';

  if (!u || u.length < 2) { errEl.textContent = '昵称至少2个字符'; return; }
  if (!p || p.length < 6) { errEl.textContent = '密码至少6位'; return; }

  try {
    const endpoint = isRegistering ? '/api/auth/register' : '/api/auth/login';
    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.detail?.detail || data.detail || '操作失败';
      return;
    }
    token = data.token;
    username = data.username;
    localStorage.setItem('nous_token', token);
    localStorage.setItem('nous_username', username);
    if (isRegistering) {
      await enterApp();
      showOnboardingProfile();
    } else {
      await enterApp();
    }
  } catch (e) {
    errEl.textContent = '网络连接失败';
  }
}

function logout() {
  token = '';
  username = '';
  localStorage.removeItem('nous_token');
  localStorage.removeItem('nous_username');
  document.getElementById('page-app').classList.add('hidden');
  document.getElementById('page-auth').classList.remove('hidden');
  document.getElementById('auth-password').value = '';
  currentPersona = null;
  currentConversationId = null;
  conversations = [];
}

/* ═══════════════════════════════════════════
   Enter App
   ═══════════════════════════════════════════ */
async function enterApp() {
  document.getElementById('page-auth').classList.add('hidden');
  document.getElementById('page-app').classList.remove('hidden');
  document.getElementById('user-badge').textContent = username;
  await loadPersonas();
  await loadProfile();
}

/* ═══════════════════════════════════════════
   API Helper
   ═══════════════════════════════════════════ */
async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token,
      ...(opts.headers || {})
    }
  });
  if (res.status === 401) { logout(); throw new Error('请重新登录'); }
  return res;
}

/* ═══════════════════════════════════════════
   Personas
   ═══════════════════════════════════════════ */
async function loadPersonas() {
  const res = await api('/api/personas');
  personas = await res.json();
  renderPersonaList();
  // populate memory panel select
  const sel = document.getElementById('memory-persona-select');
  sel.innerHTML = '<option value="">选择人设查看记忆</option>';
  personas.forEach(p => {
    sel.innerHTML += `<option value="${p.id}">${p.avatar} ${p.name}</option>`;
  });
}

function renderPersonaList() {
  const el = document.getElementById('persona-list');
  el.innerHTML = personas.map(p => `
    <div class="persona-card ${currentPersona?.id === p.id ? 'active' : ''}"
         onclick="selectPersona('${p.id}')">
      <div class="persona-avatar" style="background:${p.avatar_bg || p.color}">${p.avatar}</div>
      <div class="persona-info">
        <div class="name">${p.name}</div>
        <div class="desc">${p.description}</div>
      </div>
    </div>
  `).join('');
}

async function selectPersona(id) {
  currentPersona = personas.find(p => p.id === id);
  if (!currentPersona) return;
  renderPersonaList();
  // Show chat UI
  document.getElementById('chat-welcome').classList.add('hidden');
  document.getElementById('chat-messages').classList.remove('hidden');
  document.getElementById('chat-input-bar').classList.remove('hidden');
  document.getElementById('chat-header').classList.remove('hidden');
  document.getElementById('chat-persona-name').textContent = currentPersona.avatar + ' ' + currentPersona.name;
  document.getElementById('chat-persona-desc').textContent = currentPersona.description;
  // Close sidebar on mobile & close conv dropdown
  document.getElementById('persona-sidebar').classList.remove('open');
  document.getElementById('conv-dropdown').classList.remove('open');
  // Load conversations and auto-select the latest
  await loadConversations();
  // Focus input
  document.getElementById('chat-input').focus();
}

/* ═══════════════════════════════════════════
   Conversations (Multi-conversation)
   ═══════════════════════════════════════════ */
async function loadConversations() {
  if (!currentPersona) return;
  try {
    const res = await api(`/api/conversations/${currentPersona.id}`);
    const data = await res.json();
    conversations = data.conversations || [];
  } catch (e) {
    conversations = [];
  }
  // Auto-select latest conversation or show empty
  if (conversations.length > 0) {
    await switchConversation(conversations[0].id);
  } else {
    // Auto-create first conversation
    await newConversation(true);
  }
}

async function switchConversation(convId) {
  currentConversationId = convId;
  document.getElementById('conv-dropdown').classList.remove('open');
  await loadHistory();
}

async function newConversation(silent = false) {
  if (!currentPersona) return;
  try {
    const res = await api(`/api/conversations/${currentPersona.id}`, {
      method: 'POST',
      body: JSON.stringify({ title: '' })
    });
    const conv = await res.json();
    conversations.unshift(conv);
    currentConversationId = conv.id;
    // Clear chat area and show greeting
    const el = document.getElementById('chat-messages');
    el.innerHTML = '';
    appendMessage('assistant', currentPersona.greeting || `你好！我是${currentPersona.name}，有什么想聊的？`, false);
    scrollToBottom();
    if (!silent) showToast('已创建新对话 ✨', 'success');
    document.getElementById('conv-dropdown').classList.remove('open');
    document.getElementById('chat-input').focus();
  } catch (e) {
    showToast('创建对话失败', 'error');
  }
}

function toggleConvDropdown() {
  const dd = document.getElementById('conv-dropdown');
  const isOpen = dd.classList.toggle('open');
  if (isOpen) renderConvList();
}

function renderConvList() {
  const el = document.getElementById('conv-list');
  if (conversations.length === 0) {
    el.innerHTML = '<div class="conv-empty">还没有对话记录</div>';
    return;
  }
  el.innerHTML = conversations.map(c => {
    const isActive = c.id === currentConversationId;
    const date = c.updated_at ? formatDate(c.updated_at) : '';
    const msgCount = c.message_count || 0;
    return `
      <div class="conv-item ${isActive ? 'active' : ''}" onclick="switchConversation('${c.id}')">
        <div class="conv-item-info">
          <div class="conv-item-title">${escapeHtml(c.title || '新对话')}</div>
          <div class="conv-item-meta">${date} · ${msgCount}条消息</div>
        </div>
        <button class="conv-item-delete" onclick="event.stopPropagation();deleteConversation('${c.id}')" title="删除对话">🗑</button>
      </div>
    `;
  }).join('');
}

async function deleteConversation(convId) {
  if (!currentPersona) return;
  if (!confirm('确定删除这个对话？')) return;
  try {
    await api(`/api/conversations/${currentPersona.id}/${convId}`, { method: 'DELETE' });
    conversations = conversations.filter(c => c.id !== convId);
    showToast('对话已删除', 'success');
    if (convId === currentConversationId) {
      if (conversations.length > 0) {
        await switchConversation(conversations[0].id);
      } else {
        await newConversation(true);
      }
    }
    renderConvList();
  } catch (e) {
    showToast('删除失败', 'error');
  }
}

function formatDate(isoStr) {
  try {
    const d = new Date(isoStr);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
    if (diff < 604800000) return Math.floor(diff/86400000) + '天前';
    return (d.getMonth()+1) + '/' + d.getDate();
  } catch(e) { return ''; }
}

/* ═══════════════════════════════════════════
   Chat
   ═══════════════════════════════════════════ */
async function loadHistory() {
  const el = document.getElementById('chat-messages');
  el.innerHTML = '';
  try {
    let url = `/api/chat/history/${currentPersona.id}?limit=50`;
    if (currentConversationId) url += `&conversation_id=${currentConversationId}`;
    const res = await api(url);
    const data = await res.json();
    const messages = data.messages || data || [];
    // Update conversation_id if returned
    if (data.conversation_id) currentConversationId = data.conversation_id;
    messages.forEach(m => appendMessage(m.role, m.content, false));
    if (messages.length === 0) {
      appendMessage('assistant', currentPersona.greeting || `你好！我是${currentPersona.name}，有什么想聊的？`, false);
    }
    scrollToBottom();
  } catch (e) {
    appendMessage('assistant', currentPersona.greeting || `你好！我是${currentPersona.name}，有什么想聊的？`, false);
  }
}

function appendMessage(role, content, animate = true) {
  const el = document.getElementById('chat-messages');
  const avatar = role === 'user' ? '😊' : (currentPersona?.avatar || '🧠');
  const avatarBg = role === 'user' ? '' : `style="background:${currentPersona?.avatar_bg || currentPersona?.color || '#7c5bf5'}"`;
  const div = document.createElement('div');
  div.className = `msg ${role}` + (animate ? ' fade-in' : '');
  div.innerHTML = `
    <div class="msg-avatar" ${avatarBg}>${avatar}</div>
    <div class="msg-bubble">${escapeHtml(content)}</div>
  `;
  el.appendChild(div);
  return div;
}

function showTyping() {
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-msg';
  div.innerHTML = `
    <div class="msg-avatar" style="background:${currentPersona?.avatar_bg || currentPersona?.color || '#7c5bf5'}">${currentPersona?.avatar || '🧠'}</div>
    <div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
  `;
  el.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

async function sendMessage() {
  if (isSending || !currentPersona) return;
  const input = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content) return;

  input.value = '';
  autoResize(input);
  isSending = true;
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', content);
  scrollToBottom();
  showTyping();

  try {
    const body = {
      persona_id: currentPersona.id,
      content
    };
    if (currentConversationId) body.conversation_id = currentConversationId;

    const res = await fetch(API + '/api/chat/stream', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      removeTyping();
      appendMessage('assistant', '⚠️ 请求失败，请稍后重试');
      return;
    }

    removeTyping();
    const msgDiv = appendMessage('assistant', '');
    const bubble = msgDiv.querySelector('.msg-bubble');
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'delta') {
            fullText += data.content;
            bubble.innerHTML = formatContent(fullText);
            scrollToBottom();
          } else if (data.type === 'done') {
            // Update conversation_id from server
            if (data.conversation_id) currentConversationId = data.conversation_id;
            // Refresh conversation list title/count in background
            refreshConvList();
          } else if (data.type === 'error') {
            fullText += '\n⚠️ ' + data.message;
            bubble.innerHTML = formatContent(fullText);
          }
        } catch (e) {}
      }
    }
  } catch (e) {
    removeTyping();
    appendMessage('assistant', '⚠️ 网络连接失败');
  } finally {
    isSending = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

async function refreshConvList() {
  // Silently refresh conversation list
  if (!currentPersona) return;
  try {
    const res = await api(`/api/conversations/${currentPersona.id}`);
    const data = await res.json();
    conversations = data.conversations || [];
  } catch(e) {}
}

async function clearChat() {
  if (!currentPersona || !currentConversationId) return;
  if (!confirm(`确定清空当前对话？\n记忆会保留。`)) return;
  try {
    await api(`/api/chat/history/${currentPersona.id}?conversation_id=${currentConversationId}`, { method: 'DELETE' });
    document.getElementById('chat-messages').innerHTML = '';
    appendMessage('assistant', `对话已清空，但我还记得关于你的一切 😊`, true);
    showToast('对话已清空', 'success');
    refreshConvList();
  } catch (e) {
    showToast('清空失败', 'error');
  }
}

/* ═══════════════════════════════════════════
   Profile
   ═══════════════════════════════════════════ */
async function loadProfile() {
  try {
    const res = await api('/api/profile');
    const p = await res.json();
    document.getElementById('profile-age').value = p.age || '';
    document.getElementById('profile-gender').value = p.gender || '';
    document.getElementById('profile-occupation').value = p.occupation || '';
    document.getElementById('profile-bio').value = p.bio || '';
    interests = p.interests || [];
    renderInterests();
  } catch (e) {}
}

function renderInterests() {
  const el = document.getElementById('profile-interests-tags');
  el.innerHTML = interests.map((t, i) => `
    <span class="tag">${t} <span class="remove" onclick="removeInterest(${i})">✕</span></span>
  `).join('');
}

function addInterest() {
  const input = document.getElementById('profile-interest-input');
  const val = input.value.trim();
  if (val && !interests.includes(val)) {
    interests.push(val);
    renderInterests();
  }
  input.value = '';
}

function removeInterest(idx) {
  interests.splice(idx, 1);
  renderInterests();
}

async function saveProfile() {
  const data = {
    age: parseInt(document.getElementById('profile-age').value) || null,
    gender: document.getElementById('profile-gender').value || null,
    occupation: document.getElementById('profile-occupation').value.trim() || null,
    interests: interests.length ? interests : null,
    bio: document.getElementById('profile-bio').value.trim() || null
  };
  // remove nulls
  Object.keys(data).forEach(k => data[k] == null && delete data[k]);
  try {
    await api('/api/profile', { method: 'PUT', body: JSON.stringify(data) });
    showToast('档案保存成功 ✓', 'success');
  } catch (e) {
    showToast('保存失败', 'error');
  }
}

/* ═══════════════════════════════════════════
   Onboarding Profile
   ═══════════════════════════════════════════ */
let obInterests = [];

function showOnboardingProfile() {
  obInterests = [];
  document.getElementById('ob-interests-tags').innerHTML = '';
  document.getElementById('onboarding-overlay').classList.add('open');
}

function closeOnboarding() {
  document.getElementById('onboarding-overlay').classList.remove('open');
}

function addObInterest() {
  const inp = document.getElementById('ob-interest-input');
  const v = inp.value.trim();
  if (!v || obInterests.includes(v)) { inp.value = ''; return; }
  obInterests.push(v);
  inp.value = '';
  renderObTags();
}

function removeObInterest(i) {
  obInterests.splice(i, 1);
  renderObTags();
}

function renderObTags() {
  document.getElementById('ob-interests-tags').innerHTML = obInterests.map((t, i) =>
    `<span class="tag">${escapeHtml(t)} <span class="tag-remove" onclick="removeObInterest(${i})">×</span></span>`
  ).join('');
}

async function saveOnboardingProfile() {
  const data = {
    age: parseInt(document.getElementById('ob-age').value) || null,
    gender: document.getElementById('ob-gender').value || null,
    occupation: document.getElementById('ob-occupation').value.trim() || null,
    interests: obInterests.length ? obInterests : null,
    bio: document.getElementById('ob-bio').value.trim() || null
  };
  Object.keys(data).forEach(k => data[k] == null && delete data[k]);
  if (Object.keys(data).length === 0) {
    closeOnboarding();
    showToast('档案稍后可在设置中填写 📝');
    return;
  }
  try {
    await api('/api/profile', { method: 'PUT', body: JSON.stringify(data) });
    closeOnboarding();
    showToast('档案保存成功，开始聊天吧！ 🎉', 'success');
    // sync to profile panel
    await loadProfile();
  } catch (e) {
    showToast('保存失败，稍后可在设置中重试', 'error');
    closeOnboarding();
  }
}

/* ═══════════════════════════════════════════
   Memory
   ═══════════════════════════════════════════ */
async function loadMemory() {
  const pid = document.getElementById('memory-persona-select').value;
  const el = document.getElementById('memory-list');
  if (!pid) {
    el.innerHTML = '<div class="memory-empty"><div class="icon">🧩</div><p>选择人设后查看 TA 记住了什么</p></div>';
    return;
  }
  try {
    const res = await api(`/api/memory/${pid}`);
    const data = await res.json();
    const memories = data.memories || {};
    const keys = Object.keys(memories);
    if (keys.length === 0) {
      el.innerHTML = '<div class="memory-empty"><div class="icon">🌱</div><p>还没有记忆，多聊几轮就有啦</p></div>';
      return;
    }
    el.innerHTML = keys.map(k => `
      <div class="memory-card">
        <div class="mem-key">${escapeHtml(k)}</div>
        <div class="mem-value">${escapeHtml(memories[k])}</div>
        <div class="mem-actions">
          <button class="btn btn-ghost btn-sm" onclick="editMemory('${pid}','${escapeAttr(k)}')">✏️ 编辑</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteMemory('${pid}','${escapeAttr(k)}')">🗑</button>
        </div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = '<div class="memory-empty"><div class="icon">⚠️</div><p>加载失败</p></div>';
  }
}

async function editMemory(pid, key) {
  const newVal = prompt(`编辑记忆「${key}」:`, '');
  if (newVal === null) return;
  try {
    await api(`/api/memory/${pid}/${encodeURIComponent(key)}`, {
      method: 'PUT',
      body: JSON.stringify({ value: newVal })
    });
    showToast('记忆已更新', 'success');
    loadMemory();
  } catch (e) {
    showToast('更新失败', 'error');
  }
}

async function deleteMemory(pid, key) {
  if (!confirm(`删除记忆「${key}」？`)) return;
  try {
    await api(`/api/memory/${pid}/${encodeURIComponent(key)}`, { method: 'DELETE' });
    showToast('记忆已删除', 'success');
    loadMemory();
  } catch (e) {
    showToast('删除失败', 'error');
  }
}

/* ═══════════════════════════════════════════
   Panels
   ═══════════════════════════════════════════ */
function openPanel(name) {
  closePanel();
  document.getElementById(`panel-${name}`).classList.add('open');
  document.getElementById('overlay').classList.add('open');
  if (name === 'memory' && currentPersona) {
    document.getElementById('memory-persona-select').value = currentPersona.id;
    loadMemory();
  }
}

function closePanel() {
  document.querySelectorAll('.slide-panel').forEach(p => p.classList.remove('open'));
  document.getElementById('overlay').classList.remove('open');
}

function toggleSidebar() {
  document.getElementById('persona-sidebar').classList.toggle('open');
}

/* ═══════════════════════════════════════════
   Helpers
   ═══════════════════════════════════════════ */
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  if (Array.isArray(s)) return s.map(escapeHtml).join('、');
  if (typeof s === 'object') return escapeHtml(JSON.stringify(s));
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

function formatContent(text) {
  // Simple markdown: bold, italic, code, newlines
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/`(.+?)`/g, '<code style="background:rgba(124,91,245,0.2);padding:1px 5px;border-radius:3px;">$1</code>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  const el = document.getElementById('chat-messages');
  el.scrollTop = el.scrollHeight;
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2500);
}
</script>
