<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>神智 Nous</title>
<style>
/* ═══════════════════════════════════════════
   CSS Variables & Reset
   ═══════════════════════════════════════════ */
:root {
  --bg: #0f0f1a;
  --bg2: #1a1a2e;
  --bg3: #16213e;
  --surface: #1e1e32;
  --surface2: #252540;
  --border: #2a2a4a;
  --text: #e8e8f0;
  --text2: #a0a0c0;
  --text3: #6a6a8a;
  --accent: #7c5bf5;
  --accent2: #a78bfa;
  --accent-glow: rgba(124, 91, 245, 0.3);
  --success: #34d399;
  --danger: #f87171;
  --warning: #fbbf24;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  -webkit-overflow-scrolling: touch;
}

/* ═══════════════════════════════════════════
   Utilities
   ═══════════════════════════════════════════ */
.hidden { display: none !important; }
.fade-in { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #9333ea);
  color: white;
  box-shadow: 0 2px 12px var(--accent-glow);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
.btn-ghost {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-danger { background: var(--danger); color: white; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

input[type="text"], input[type="password"], input[type="number"], textarea, select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  width: 100%;
  outline: none;
  transition: var(--transition);
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

/* ═══════════════════════════════════════════
   Page: Auth (Login / Register)
   ═══════════════════════════════════════════ */
#page-auth {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at top, var(--bg3) 0%, var(--bg) 70%);
}
.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  width: 380px;
  max-width: 90vw;
  box-shadow: var(--shadow);
}
.auth-logo {
  text-align: center;
  margin-bottom: 28px;
}
.auth-logo h1 {
  font-size: 32px;
  background: linear-gradient(135deg, var(--accent2), #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.auth-logo p { color: var(--text3); font-size: 14px; }
.auth-form { display: flex; flex-direction: column; gap: 14px; }
.auth-form input { padding: 12px 16px; }
.auth-toggle {
  text-align: center;
  margin-top: 16px;
  color: var(--text3);
  font-size: 13px;
}
.auth-toggle a {
  color: var(--accent2);
  cursor: pointer;
  text-decoration: none;
}
.auth-toggle a:hover { text-decoration: underline; }
.auth-error {
  color: var(--danger);
  font-size: 13px;
  text-align: center;
  min-height: 20px;
}

/* ═══════════════════════════════════════════
   Page: Main App Layout
   ═══════════════════════════════════════════ */
#page-app {
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Top Bar */
.top-bar {
  min-height: 56px;
  padding-top: env(safe-area-inset-top, 0px);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding-left: max(20px, env(safe-area-inset-left, 0px));
  padding-right: max(20px, env(safe-area-inset-right, 0px));
  gap: 12px;
  flex-shrink: 0;
  z-index: 100;
}
.top-bar .logo {
  font-size: 18px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent2), #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.top-bar .spacer { flex: 1; }
.top-bar .nav-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  transition: var(--transition);
}
.top-bar .nav-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
.top-bar .nav-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
.top-bar .user-badge {
  font-size: 13px;
  color: var(--text2);
  padding: 4px 10px;
  background: var(--surface2);
  border-radius: 20px;
}

/* Main Content */
.main-content {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ═══════════════════════════════════════════
   Persona Sidebar
   ═══════════════════════════════════════════ */
.persona-sidebar {
  width: 260px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.persona-sidebar h3 {
  padding: 16px 20px 12px;
  font-size: 13px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.persona-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 12px 12px;
}
.persona-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  margin-bottom: 4px;
}
.persona-card:hover { background: var(--surface); }
.persona-card.active {
  background: linear-gradient(135deg, rgba(124,91,245,0.15), rgba(147,51,234,0.1));
  border: 1px solid rgba(124,91,245,0.3);
}
.persona-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.persona-info { flex: 1; min-width: 0; }
.persona-info .name { font-size: 15px; font-weight: 600; }
.persona-info .desc {
  font-size: 12px;
  color: var(--text3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ═══════════════════════════════════════════
   Chat Area
   ═══════════════════════════════════════════ */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.chat-header {
  height: 52px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 10px;
  background: var(--surface);
}
.chat-header .persona-name { font-weight: 600; font-size: 16px; }
.chat-header .persona-desc { font-size: 13px; color: var(--text3); }
.chat-header .spacer { flex: 1; }
.chat-header .header-btn {
  padding: 6px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: var(--transition);
}
.chat-header .header-btn:hover { background: var(--surface2); }

/* Messages */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.msg { display: flex; gap: 10px; max-width: 80%; animation: slideUp 0.3s ease; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.assistant { align-self: flex-start; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 2px;
}
.msg.user .msg-avatar { background: var(--accent); font-size: 14px; }

.msg-content {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.msg-bubble {
  padding: 10px 16px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.7;
  word-break: break-word;
}
.msg.user .msg-bubble {
  background: linear-gradient(135deg, var(--accent), #9333ea);
  color: white;
  border-bottom-right-radius: 4px;
}
.msg.assistant .msg-bubble {
  background: var(--surface2);
  color: var(--text);
  border-bottom-left-radius: 4px;
}
.msg-time {
  font-size: 11px;
  color: var(--text3);
  padding: 0 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.msg:hover .msg-time, .msg-time.always-show {
  opacity: 1;
}
.msg.user .msg-time { text-align: right; }

/* Markdown in assistant bubbles */
.msg.assistant .msg-bubble p { margin: 0 0 8px 0; }
.msg.assistant .msg-bubble p:last-child { margin-bottom: 0; }
.msg.assistant .msg-bubble ul, .msg.assistant .msg-bubble ol {
  margin: 4px 0 8px 0; padding-left: 20px;
}
.msg.assistant .msg-bubble li { margin-bottom: 2px; }
.msg.assistant .msg-bubble code {
  background: rgba(124,91,245,0.15);
  padding: 1px 5px;
  border-radius: 3px;
  font-size: 13px;
  font-family: 'Menlo', 'Consolas', monospace;
}
.msg.assistant .msg-bubble pre {
  background: rgba(0,0,0,0.3);
  padding: 12px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 8px 0;
}
.msg.assistant .msg-bubble pre code {
  background: none;
  padding: 0;
  font-size: 13px;
  line-height: 1.5;
}
.msg.assistant .msg-bubble blockquote {
  border-left: 3px solid var(--accent);
  margin: 8px 0;
  padding: 4px 12px;
  color: var(--text2);
}
.msg.assistant .msg-bubble h1, .msg.assistant .msg-bubble h2,
.msg.assistant .msg-bubble h3, .msg.assistant .msg-bubble h4 {
  margin: 12px 0 6px 0;
  font-size: 15px;
  font-weight: 600;
}
.msg.assistant .msg-bubble a {
  color: var(--accent);
  text-decoration: underline;
}
.msg.assistant .msg-bubble table {
  border-collapse: collapse;
  margin: 8px 0;
  font-size: 13px;
}
.msg.assistant .msg-bubble th, .msg.assistant .msg-bubble td {
  border: 1px solid var(--border);
  padding: 4px 8px;
}
.msg.assistant .msg-bubble th {
  background: rgba(124,91,245,0.1);
}

/* Welcome Screen */
.chat-welcome {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}
.chat-welcome .welcome-avatar { font-size: 64px; margin-bottom: 16px; }
.chat-welcome h2 { font-size: 22px; margin-bottom: 8px; }
.chat-welcome p { color: var(--text3); font-size: 14px; max-width: 400px; }

/* Typing Indicator */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 4px 0;
  align-items: center;
}
.typing-indicator .dots {
  display: flex; gap: 4px; align-items: center;
}
.typing-indicator .dots span {
  width: 6px; height: 6px;
  background: var(--text3);
  border-radius: 50%;
  animation: pulse 1.4s ease-in-out infinite;
}
.typing-indicator .dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator .dots span:nth-child(3) { animation-delay: 0.4s; }
.typing-indicator .typing-text {
  font-size: 12px;
  color: var(--text3);
  margin-left: 6px;
  animation: fadeInOut 2s ease-in-out infinite;
}
@keyframes fadeInOut {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* Input Bar */
.chat-input-bar {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.chat-input-bar textarea {
  flex: 1;
  resize: none;
  max-height: 120px;
  min-height: 42px;
  padding: 10px 14px;
  font-size: 14px;
  line-height: 1.5;
  border-radius: 20px;
}
.send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--accent), #9333ea);
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ═══════════════════════════════════════════
   Conversation History Dropdown
   ═══════════════════════════════════════════ */
.conv-dropdown {
  position: absolute;
  top: 52px;
  left: 0;
  right: 0;
  max-height: 400px;
  overflow-y: auto;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  z-index: 120;
  display: none;
}
.conv-dropdown.open { display: block; }
.conv-dropdown-header {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
}
.conv-dropdown-header h4 {
  flex: 1;
  font-size: 13px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.conv-item {
  display: flex;
  align-items: center;
  padding: 12px 20px;
  cursor: pointer;
  transition: var(--transition);
  border-bottom: 1px solid rgba(42,42,74,0.3);
}
.conv-item:hover { background: var(--surface); }
.conv-item.active { background: rgba(124,91,245,0.12); border-left: 3px solid var(--accent); }
.conv-item-info { flex: 1; min-width: 0; }
.conv-item-title {
  font-size: 14px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.conv-item-meta {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}
.conv-item-delete {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--text3);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}
.conv-item-delete:hover { background: var(--danger); color: white; }
.conv-empty {
  text-align: center;
  padding: 24px;
  color: var(--text3);
  font-size: 13px;
}

/* ═══════════════════════════════════════════
   Panel: Profile & Memory (slide-over)
   ═══════════════════════════════════════════ */
.slide-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 400px;
  max-width: 90vw;
  height: 100vh;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  z-index: 200;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
  box-shadow: -4px 0 24px rgba(0,0,0,0.5);
}
.slide-panel.open { right: 0; }
.panel-header {
  height: 56px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
}
.panel-header h3 { flex: 1; font-size: 16px; }
.panel-close {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: none;
  background: var(--surface2);
  color: var(--text2);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.panel-close:hover { background: var(--danger); color: white; }
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Profile Form */
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 6px;
  font-weight: 500;
}
.form-group .tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 6px;
}
.form-group .tag {
  padding: 4px 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 4px;
}
.form-group .tag .remove {
  cursor: pointer;
  color: var(--danger);
  font-weight: bold;
}
.tag-input {
  display: flex;
  gap: 6px;
}
.tag-input input { flex: 1; }

/* Memory Cards */
.memory-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  transition: var(--transition);
}
.memory-card:hover { border-color: var(--accent); }
.memory-card .mem-key {
  font-size: 12px;
  color: var(--accent2);
  font-weight: 600;
  margin-bottom: 4px;
}
.memory-card .mem-value {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
}
.memory-card .mem-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  justify-content: flex-end;
}
.memory-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
}
.memory-empty .icon { font-size: 48px; margin-bottom: 12px; }
.memory-persona-select {
  margin-bottom: 16px;
}

/* Overlay */
.overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 199;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.open { opacity: 1; pointer-events: auto; }

/* Onboarding Modal */
.onboarding-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 300;
  display: none; align-items: center; justify-content: center;
  animation: fadeIn 0.3s;
}
.onboarding-overlay.open { display: flex; }
.onboarding-modal {
  background: var(--surface); border-radius: 20px;
  width: min(420px, 90vw); max-height: 85vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  border: 1px solid var(--border);
}
.onboarding-header {
  text-align: center; padding: 28px 24px 12px;
}
.onboarding-emoji { font-size: 48px; display: block; margin-bottom: 8px; }
.onboarding-header h2 { margin: 0 0 6px; font-size: 22px; }
.onboarding-header p { margin: 0; color: var(--muted); font-size: 14px; }
.onboarding-body { padding: 8px 24px 16px; }
.onboarding-footer {
  display: flex; justify-content: space-between; gap: 12px;
  padding: 12px 24px 24px;
}
.onboarding-footer .btn { flex: 1; justify-content: center; }

/* Persona Editor Modal */
.persona-editor-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 300;
  display: none; align-items: center; justify-content: center;
  animation: fadeIn 0.3s;
}
.persona-editor-overlay.open { display: flex; }
.persona-editor-modal {
  background: var(--surface); border-radius: 20px;
  width: min(480px, 92vw); max-height: 85vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  border: 1px solid var(--border);
}
.persona-editor-header {
  text-align: center; padding: 24px 24px 12px;
}
.persona-editor-header h2 { font-size: 20px; margin: 0; }
.persona-editor-header p { color: var(--text3); font-size: 13px; margin-top: 4px; }
.persona-editor-body { padding: 8px 24px 16px; }
.persona-editor-body .form-group { margin-bottom: 14px; }
.persona-editor-body .form-row {
  display: flex; gap: 12px;
}

<script>
/* ═══════════════════════════════════════════
   State
   ═══════════════════════════════════════════ */
const API = '';
let token = localStorage.getItem('nous_token') || '';
let username = localStorage.getItem('nous_username') || '';
let personas = [];
let currentPersona = null;
let currentConversationId = null;
let conversations = [];
let isRegistering = false;
let isSending = false;
let interests = [];

/* ═══════════════════════════════════════════
   Init
   ═══════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  if (token && username) {
    enterApp();
  }
});

/* ═══════════════════════════════════════════
   Auth
   ═══════════════════════════════════════════ */
function toggleAuthMode() {
  isRegistering = !isRegistering;
  document.getElementById('auth-btn-text').textContent = isRegistering ? '注 册' : '登 录';
  document.getElementById('auth-toggle-text').textContent = isRegistering ? '已有账号？' : '还没有账号？';
  document.getElementById('auth-toggle-link').textContent = isRegistering ? '立即登录' : '立即注册';
  document.getElementById('auth-error').textContent = '';
}

async function doAuth() {
  const u = document.getElementById('auth-username').value.trim();
  const p = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';

  if (!u || u.length < 2) { errEl.textContent = '昵称至少2个字符'; return; }
  if (!p || p.length < 6) { errEl.textContent = '密码至少6位'; return; }

  try {
    const endpoint = isRegistering ? '/api/auth/register' : '/api/auth/login';
    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (!res.ok) {
      errEl.textContent = data.detail?.detail || data.detail || '操作失败';
      return;
    }
    token = data.token;
    username = data.username;
    localStorage.setItem('nous_token', token);
    localStorage.setItem('nous_username', username);
    if (isRegistering) {
      await enterApp();
      showOnboardingProfile();
    } else {
      await enterApp();
    }
  } catch (e) {
    errEl.textContent = '网络连接失败';
  }

   API Helper

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token,
      ...(opts.headers || {})
    }
  });
  if (res.status === 401) { logout(); throw new Error('请重新登录'); }
  return res;
}

  if (!currentPersona) return;
  try {

    const data = await res.json();

async function newConversation(silent = false) {
  if (!currentPersona) return;

    const res = await api(`/api/conversations/${currentPersona.id}`, {
      method: 'POST',
      body: JSON.stringify({ title: '' })
    });

  const el = document.getElementById('conv-list');
  if (conversations.length === 0) {
    el.innerHTML = '<div class="conv-empty">还没有对话记录</div>';
    return;
  }
  el.innerHTML = conversations.map(c => {
    const isActive = c.id === currentConversationId;
    const date = c.updated_at ? formatDate(c.updated_at) : '';
    const msgCount = c.message_count || 0;
    return `
      <div class="conv-item ${isActive ? 'active' : ''}" onclick="switchConversation('${c.id}')">
        <div class="conv-item-info">

  }).join('');

async function deleteConversation(convId) {
  if (!currentPersona) return;
  if (!confirm('确定删除这个对话？')) return;
  try {
    await api(`/api/conversations/${currentPersona.id}/${convId}`, { method: 'DELETE' });
    conversations = conversations.filter(c => c.id !== convId);
    showToast('对话已删除', 'success');
    if (convId === currentConversationId) {
      if (conversations.length > 0) {
        await switchConversation(conversations[0].id);
      } else {
        await newConversation(true);
      }
    }
    renderConvList();
  } catch (e) {
    showToast('删除失败', 'error');
  }
}

function formatDate(isoStr) {
  try {
    const d = new Date(isoStr);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
    if (diff < 604800000) return Math.floor(diff/86400000) + '天前';
    return (d.getMonth()+1) + '/' + d.getDate();
  } catch(e) { return ''; }
}

async function loadHistory() {
  const el = document.getElementById('chat-messages');
  el.innerHTML = '';
  try {
    let url = `/api/chat/history/${currentPersona.id}?limit=50`;
    if (currentConversationId) url += `&conversation_id=${currentConversationId}`;
    const res = await api(url);
    const data = await res.json();
    const messages = data.messages || data || [];
    // Update conversation_id if returned
    if (data.conversation_id) currentConversationId = data.conversation_id;
    messages.forEach(m => appendMessage(m.role, m.content, false, m.timestamp));
    if (messages.length === 0) {
      appendMessage('assistant', currentPersona.greeting || `你好！我是${currentPersona.name}，有什么想聊的？`, false);
    }
    scrollToBottom();
  } catch (e) {
    appendMessage('assistant', currentPersona.greeting || `你好！我是${currentPersona.name}，有什么想聊的？`, false);
  }
}

function appendMessage(role, content, animate = true, timestamp = null) {
  const el = document.getElementById('chat-messages');
  const avatar = role === 'user' ? '😊' : (currentPersona?.avatar || '🧠');
  const avatarBg = role === 'user' ? '' : `style="background:${currentPersona?.avatar_bg || currentPersona?.color || '#7c5bf5'}"`;
  const div = document.createElement('div');
  div.className = `msg ${role}` + (animate ? ' fade-in' : '');
  const rendered = role === 'assistant' ? renderMarkdown(content) : escapeHtml(content).replace(/\n/g, '<br>');
  const timeStr = timestamp ? formatMsgTime(timestamp) : formatMsgTime(new Date().toISOString());
  div.innerHTML = `
    <div class="msg-avatar" ${avatarBg}>${avatar}</div>
    <div class="msg-content">
      <div class="msg-bubble">${rendered}</div>
      <div class="msg-time">${timeStr}</div>
    </div>
  `;
  el.appendChild(div);
  return div;
}

function showTyping() {
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-msg';
  div.innerHTML = `
    <div class="msg-avatar" style="background:${currentPersona?.avatar_bg || currentPersona?.color || '#7c5bf5'}">${currentPersona?.avatar || '🧠'}</div>
    <div class="msg-content">
      <div class="msg-bubble">
        <div class="typing-indicator">
          <div class="dots"><span></span><span></span><span></span></div>
          <span class="typing-text">正在思考…</span>
        </div>
      </div>
    </div>
  `;
  el.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const el = document.getElementById('typing-msg');
  if (el) el.remove();
}

async function sendMessage() {
  if (isSending || !currentPersona) return;
  const input = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content) return;

  input.value = '';
  autoResize(input);
  isSending = true;
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', content);
  scrollToBottom();
  showTyping();

  try {
    const body = {
      persona_id: currentPersona.id,
      content
    };
    if (currentConversationId) body.conversation_id = currentConversationId;

    const res = await fetch(API + '/api/chat/stream', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      removeTyping();
      appendMessage('assistant', '⚠️ 请求失败，请稍后重试');
      return;
    }

    removeTyping();
    const msgDiv = appendMessage('assistant', '');
    const bubble = msgDiv.querySelector('.msg-bubble');
    const timeEl = msgDiv.querySelector('.msg-time');
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'delta') {
            fullText += data.content;
            bubble.innerHTML = renderMarkdown(fullText);
            scrollToBottom();
          } else if (data.type === 'done') {
            // Final render with full markdown
            bubble.innerHTML = renderMarkdown(fullText);
            // Update timestamp to now
            timeEl.textContent = formatMsgTime(new Date().toISOString());
            // Update conversation_id from server
            if (data.conversation_id) currentConversationId = data.conversation_id;
            // Refresh conversation list title/count in background
            refreshConvList();
          } else if (data.type === 'error') {
            fullText += '\n⚠️ ' + data.message;
            bubble.innerHTML = renderMarkdown(fullText);
          }
        } catch (e) {}
      }
    }
  } catch (e) {
    removeTyping();
    appendMessage('assistant', '⚠️ 网络连接失败');
  } finally {
    isSending = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

  if (!currentPersona) return;

    color: peColor,
    avatar_bg: peColor,
    greeting: document.getElementById('pe-greeting').value.trim() || `你好！我是${name}，有什么想聊的？`,
    system_prompt
  };

  try {
    if (editingPersonaId) {
      // Update
      const res = await api(`/api/personas/custom/${editingPersonaId}`, {
        method: 'PUT', body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error('更新失败');
      showToast('人设已更新 ✓', 'success');
    } else {
      // Create
      const res = await api('/api/personas/custom', {
        method: 'POST', body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error('创建失败');
      showToast('人设创建成功 🎉', 'success');
    }
    closePersonaEditor();
    await loadPersonas();
  } catch (e) {
    showToast(e.message || '操作失败', 'error');
  }
}

async function deletePersona(personaId) {
  const p = personas.find(x => x.id === personaId);
  if (!confirm(`确定删除人设「${p?.name || personaId}」？\n相关对话和记忆不会被删除。`)) return;
  try {
    const res = await api(`/api/personas/custom/${personaId}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('删除失败');
    showToast('人设已删除', 'success');
    if (currentPersona?.id === personaId) {
      currentPersona = null;
      currentConversationId = null;
      document.getElementById('chat-welcome').classList.remove('hidden');
      document.getElementById('chat-messages').classList.add('hidden');
      document.getElementById('chat-input-bar').classList.add('hidden');
      document.getElementById('chat-header').classList.add('hidden');
    }
    await loadPersonas();
  } catch (e) {
    showToast(e.message || '删除失败', 'error');
  }
}

/* ═══════════════════════════════════════════
   Panels
   ═══════════════════════════════════════════ */
function openPanel(name) {
  closePanel();
  document.getElementById(`panel-${name}`).classList.add('open');
  document.getElementById('overlay').classList.add('open');
  if (name === 'memory' && currentPersona) {
    document.getElementById('memory-persona-select').value = currentPersona.id;
    loadMemory();
  }
}

function closePanel() {
  document.querySelectorAll('.slide-panel').forEach(p => p.classList.remove('open'));
  document.getElementById('overlay').classList.remove('open');
}

function toggleSidebar() {
  const sb = document.getElementById('persona-sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const isOpen = sb.classList.toggle('open');
  if (isOpen) {
    ov.classList.add('open');
  } else {
    ov.classList.remove('open');
  }
}

function closeSidebar() {
  document.getElementById('persona-sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

function isMobile() {
  return window.innerWidth <= 768;
}

/* ═══════════════════════════════════════════
   Helpers
   ═══════════════════════════════════════════ */
function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  if (Array.isArray(s)) return s.map(escapeHtml).join('、');
  if (typeof s === 'object') return escapeHtml(JSON.stringify(s));
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escapeAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '\\"');
}

function formatContent(text) {
  // Legacy fallback — kept for compatibility
  return renderMarkdown(text);
}

function renderMarkdown(text) {
  if (!text) return '';
  try {
    // Configure marked for chat-friendly output
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        breaks: true,       // GFM line breaks
        gfm: true,          // GitHub Flavored Markdown
        headerIds: false,
        mangle: false
      });
      return marked.parse(text);
    }
  } catch(e) {}
  // Fallback: simple formatting
  let html = escapeHtml(text);
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/`(.+?)`/g, '<code style="background:rgba(124,91,245,0.2);padding:1px 5px;border-radius:3px;">$1</code>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function formatMsgTime(isoStr) {
  try {
    const d = new Date(isoStr);
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const pad = n => String(n).padStart(2, '0');
    const time = pad(d.getHours()) + ':' + pad(d.getMinutes());
    if (msgDay.getTime() === today.getTime()) return time;
    const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
    if (msgDay.getTime() === yesterday.getTime()) return '昨天 ' + time;
    return (d.getMonth()+1) + '/' + d.getDate() + ' ' + time;
  } catch(e) { return ''; }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function scrollToBottom() {
  const el = document.getElementById('chat-messages');
  el.scrollTop = el.scrollHeight;
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2500);
}
